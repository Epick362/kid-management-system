<!doctype html>
<html lang="sk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Bez pripojenia — Domáce úlohy</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: #fdf8ee;
    color: #1a2a3a;
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    display: flex; align-items: center; justify-content: center;
    text-align: center; padding: 24px;
  }
  main { max-width: 320px; }
  .emoji { font-size: 64px; margin-bottom: 8px; }
  h1 { font-size: 24px; margin: 0 0 8px; }
  p { color: #4f5e73; line-height: 1.4; }
  button {
    margin-top: 16px;
    background: #8a6bd1;
    color: #fdf8ee;
    border: 0; border-radius: 20px;
    padding: 12px 24px; font-size: 16px; font-weight: 600;
    cursor: pointer;
  }
</style>
</head>
<body>
<main>
  <div class="emoji">🌙</div>
  <h1>Bez internetu</h1>
  <p>Skús sa znova pripojiť. Zaznamenané úlohy sa uložia, keď budeš online.</p>
  <button onclick="location.reload()">Skúsiť znova</button>
</main>
</body>
</html>
